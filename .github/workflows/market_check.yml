name: Market Check

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: db-write
  cancel-in-progress: false

jobs:
  market_check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh DB from latest remote
        run: git fetch origin main && git checkout origin/main -- data/weather_bot.db || true

      - name: Run market check job
        run: python -m bot.pipeline.market_job
        env:
          VISUAL_CROSSING_API_KEY: ${{ secrets.VISUAL_CROSSING_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Generate summary
        run: python scripts/summarize_db.py

      - name: Commit DB if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/weather_bot.db SUMMARY.md
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: auto-update db [skip ci]"
          git push origin main || (git fetch origin main && git merge -X ours origin/main --no-edit && git push origin main)
